name: Build and Push Docker Image on Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, build-atlanexis]

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ghayma
      REPO_DIR: /opt/ghayma-build/ghayma

    steps:
      - name: Ensure build directory exists
        run: mkdir -p /opt/ghayma-build

      - name: Pull latest git changes on the VM
        run: |
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone https://github.com/hirechbaghdad/ghayma.git "$REPO_DIR"
          fi

          cd "$REPO_DIR"
          git fetch origin
          git checkout main
          git reset --hard "${GITHUB_SHA}"

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          cd "$REPO_DIR"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          docker build \
            -f Dockerfile \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${SHORT_SHA}" \
            .

      - name: Push image
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${SHORT_SHA}"

      - name: Docker logout
        if: always()
        run: docker logout
