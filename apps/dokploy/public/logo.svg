<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
>
  <defs>
    <linearGradient id="atlanexisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#49F558"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>

  <g transform="translate(256 256)">
    <!-- Spirograph rings -->
    <g fill="none" stroke="url(#atlanexisGradient)" stroke-width="2" opacity="0.85">
      <path d="M200 0
               A200 200 0 0 1 -200 0
               A200 200 0 0 1 200 0" />
      <path d="M0 200
               A200 200 0 0 1 0 -200
               A200 200 0 0 1 0 200" />
    </g>

    <!-- Interlaced rotated rings -->
    <g fill="none" stroke="url(#atlanexisGradient)" stroke-width="1.8" opacity="0.7">
      <ellipse rx="200" ry="90" transform="rotate(30)"/>
      <ellipse rx="200" ry="90" transform="rotate(60)"/>
      <ellipse rx="200" ry="90" transform="rotate(90)"/>
      <ellipse rx="200" ry="90" transform="rotate(120)"/>
      <ellipse rx="200" ry="90" transform="rotate(150)"/>
    </g>

    <!-- Inner mesh -->
    <g fill="none" stroke="url(#atlanexisGradient)" stroke-width="1.5" opacity="0.6">
      <circle r="150"/>
      <circle r="125"/>
      <circle r="100"/>
      <circle r="75"/>
    </g>

    <!-- Core -->
    <circle r="22" fill="#49F558"/>
  </g>
</svg>
