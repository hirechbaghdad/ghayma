services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlanexis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-atlanexis}
    volumes:
      - atlanexis-postgres-database:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-atlanexis} -d ${POSTGRES_DB:-atlanexis} -h localhost -p 5432",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  redis:
    image: redis:7
    volumes:
      - redis-data-volume:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  atlanexis-cloudos:
    image: atlanexis-cloudos:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-atlanexis}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-atlanexis}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-atlanexis}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-me}
      PGDATABASE: ${POSTGRES_DB:-atlanexis}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ADVERTISE_ADDR: ${ADVERTISE_ADDR:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/dokploy:/etc/dokploy
      - atlanexis-docker-config:/root/.docker
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.role == manager
      # The script sets --endpoint-mode dnsrr when running inside Proxmox LXC.
      # Leaving endpoint_mode:dnsrr here matches that behavior. Remove if you don't want DNSRR.
      endpoint_mode: dnsrr
      restart_policy:
        condition: on-failure

  atlanexis-traefik:
    image: traefik:v3.5.0
    volumes:
      - /etc/dokploy/traefik/traefik.yml:/etc/traefik/traefik.yml
      - /etc/dokploy/traefik/dynamic:/etc/dokploy/traefik/dynamic
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  atlanexis-postgres-database:
  redis-data-volume:
  atlanexis-docker-config:
